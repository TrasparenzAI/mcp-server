spring.application.name=TrasparenzAI MCP Server

management.endpoints.web.exposure.include=health,info
management.endpoint.info.access=read_only

# Base URL del servizio Public Sites (override con env/profili se necessario)
public-sites.base-url=https://dica33.ba.cnr.it/public-sites-service

public-sites.company-search-max-results=100

# Base URL del servizio Results (override con env/profili se necessario)
result-service.base-url=https://dica33.ba.cnr.it/result-service

result-service.max-results=100

# Base URL del servizio Conductor (override con env/profili se necessario)
conductor.base-url=https://monitorai.ba.cnr.it/conductor-server

spring.jackson.deserialization.adjust-dates-to-context-time-zone=false

spring.ai.mcp.server.protocol=STREAMABLE

#server.port=8080

# Turn on OAuth2 Resource Server
# This assumes we have an Authorization Server available
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dica33.ba.cnr.it/keycloak/realms/trasparenzai

mcp.documentation=# Linee Guida per l'uso dei Tool di questo MCP Server\n\
- Utilizza il tool 'Ultimi risultati controllo trasparenza' solo dopo aver prelevato il codiceIpa della pubblica amministrazione.\n\
- Utilizza il tool 'Elenco delle Pubbliche Amministrazioni' sia per cercare il codiceIpa di una singola amministrazione\n\
che per ottenere un elenco di pubbliche amministrazioni (con i relativi codiciIpa)\n\
- Utilizza 'Elenco delle Pubbliche Amministrazioni' anche per cerca la lista delle pubbliche amministrazione che appartengono\n\
a un comune, provincia o regione.\n\
- Nei risultati ottenuti dal tool 'Ultimi risultati controllo trasparenza' considera come validi sia lo stato 200 che 201 e 202.\n\
- Nei risultati ottenuti dal tool 'Ultimi risultati controllo trasparenza' lo stato 202 significa che la sezione della trasparenza\n\
ha un testo alternativo valido, quindi considera lo stato 202 come valido e equivale a 200.\n\.